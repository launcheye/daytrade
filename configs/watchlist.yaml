# Multi-currency watchlist for the Market Safety Observatory.
#
# The observer monitors these symbols. Niche / altcoin symbols are allowed
# ONLY if they pass every filter below — low-volume, wide-spread, thin-book or
# pump-and-dump markets are rejected automatically (see `watchlist-check`).
#
# This is a paper / simulation watchlist. Monitoring a symbol never places a
# real order.

# The ~35 most-liquid Binance USDT spot pairs. Monitoring the full ~400-pair
# Binance universe would make each cycle take minutes and is mostly the thin,
# illiquid long tail these filters exist to reject — so this is the curated
# liquid set. Add / remove pairs freely.
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT
  - XRPUSDT
  - DOGEUSDT
  - AVAXUSDT
  - LINKUSDT
  - ADAUSDT
  - DOTUSDT
  # MATICUSDT  removed — migrated to POL; klines no longer resolve
  - LTCUSDT
  - TRXUSDT
  - ATOMUSDT
  - UNIUSDT
  - NEARUSDT
  - APTUSDT
  - ARBUSDT
  - OPUSDT
  - INJUSDT
  - FILUSDT
  - ETCUSDT
  - XLMUSDT
  - ICPUSDT
  - HBARUSDT
  - VETUSDT
  - ALGOUSDT
  - AAVEUSDT
  - MKRUSDT
  - SUIUSDT
  - SEIUSDT
  - TIAUSDT
  # RNDRUSDT  removed — migrated to RENDER; klines no longer resolve
  - IMXUSDT
  - GRTUSDT

# --- quality filters (a symbol must pass all of them) ---
# min_24h_volume_usd is calibrated to REAL current Binance liquidity. The
# crypto market is quiet right now, so $50M (a simulator-era number) rejected
# almost every coin. $2M still rejects the genuinely thin pairs (GRT, IMX,
# MKR, VET ~ <$1M) while letting the real majors through. Raise it again when
# the market is more active.
min_24h_volume_usd: 2000000         # reject low-volume markets
max_spread_bps: 8.0                 # reject wide-spread markets
min_orderbook_notional_usd: 200000  # reject thin orderbooks / liquidity gaps
pump_dump_max_1h_move_pct: 0.25     # reject extreme pump/dump candles
